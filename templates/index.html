<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>llms.txt Generator</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background: #f0f2f8; }
        .card { background: #fff; border-radius: 15px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .stages { display: flex; margin-bottom: 25px; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
        .stage-step { flex: 1; padding: 12px; text-align: center; font-size: 11px; font-weight: bold; color: #aaa; background: #f9fafb; border-right: 1px solid #e5e7eb; }
        .stage-step.active { background: #6c47ff; color: #fff; }
        .stage-step.done { background: #ecfdf5; color: #065f46; }
        .progress-track { background: #f0ecff; height: 10px; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .progress-fill { background: #6c47ff; height: 100%; width: 0%; transition: width 0.4s; }
        #logArea { background: #1e1e2e; color: #4ade80; padding: 15px; height: 200px; overflow-y: auto; border-radius: 8px; font-family: monospace; font-size: 12px; margin-top: 15px; }
        input { width: 75%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 12px 20px; background: #6c47ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .download-box { display: none; margin-top: 20px; padding: 20px; background: #f0fdf4; border: 1px solid #6ee7b7; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h2>llms.txt Generator <span>(Cloud)</span></h2>
        <div style="margin: 20px 0;">
            <input type="text" id="urlInput" placeholder="Enter URL to crawl...">
            <button id="startBtn" onclick="runPipeline()">Generate</button>
        </div>

        <div class="stages">
            <div class="stage-step" id="step-fetch">🌐 Fetching</div>
            <div class="stage-step" id="step-summarize">🤖 Summarizing</div>
            <div class="stage-step" id="step-qa">✅ QA & Fix</div>
            <div class="stage-step" id="step-generate">📄 Generating</div>
        </div>

        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div id="stats">Ready</div>
        <div id="logArea">Waiting for input...</div>

        <div id="downloadBox" class="download-box">
            <p>🎉 Your llms.txt is ready!</p>
            <button onclick="downloadFile()" style="background: #059669;">Download llms.txt</button>
        </div>
    </div>

    <script>
        let currentJobId = null;

        async function runPipeline() {
            const url = document.getElementById('urlInput').value;
            if(!url) return alert("Enter a URL");

            document.getElementById('startBtn').disabled = true;
            document.getElementById('logArea').innerHTML = "<div>Initializing pipeline...</div>";
            
            // 1. Start the job
            const formData = new FormData();
            formData.append('url', url);
            const res = await fetch('/start', { method: 'POST', body: formData });
            const data = await res.json();
            currentJobId = data.job_id;

            // 2. Listen to progress stream
            const evtSource = new EventSource('/progress/' + currentJobId);
            evtSource.onmessage = function(e) {
                const d = JSON.parse(e.data);
                if (d.type === 'stage') {
                    updateStage(d.msg);
                    document.getElementById('progressFill').style.width = d.pct + '%';
                    document.getElementById('logArea').innerHTML += `<div style="color:#60cdff">> ${d.msg}</div>`;
                } else if (d.type === 'fetch' || d.type === 'summarize') {
                    document.getElementById('stats').innerText = `${d.current} / ${d.total}`;
                    document.getElementById('logArea').innerHTML += `<div>${d.ok ? '✓' : '✗'} ${d.url}</div>`;
                } else if (d.type === 'done') {
                    evtSource.close();
                    document.getElementById('downloadBox').style.display = 'block';
                    document.getElementById('startBtn').disabled = false;
                }
                const log = document.getElementById('logArea');
                log.scrollTop = log.scrollHeight;
            };
        }

        function updateStage(msg) {
            const stages = ['fetch', 'summarize', 'qa', 'generate'];
            stages.forEach(s => {
                const el = document.getElementById('step-' + s);
                el.classList.remove('active');
                if(msg.toLowerCase().includes(s)) el.classList.add('active');
            });
        }

        function downloadFile() {
            window.location.href = '/download/' + currentJobId;
        }
    </script>
</body>
</html>
