<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>llms.txt Generator</title>
  <style>
    /* Exact CSS from your local app_local.py */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f8; min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center; padding: 40px 24px;
    }
    .card {
      background: #fff; border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.09);
      padding: 48px; width: 100%; max-width: 640px;
    }
    .logo { font-size: 26px; font-weight: 800; color: #1a1a2e; margin-bottom: 4px; }
    .logo span { color: #6c47ff; }
    .subtitle { color: #777; font-size: 14px; margin-bottom: 24px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0;
      border-radius: 20px; font-size: 11px; font-weight: 700;
      padding: 3px 12px; margin-bottom: 28px;
    }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab {
      flex: 1; padding: 9px 12px; border-radius: 8px; border: 1.5px solid #e0e0e0;
      background: #fafafa; font-size: 12px; font-weight: 600; color: #888;
      cursor: pointer; transition: all 0.2s;
    }
    .tab.active { background: #6c47ff; border-color: #6c47ff; color: #fff; }
    .upload-area {
      border: 2px dashed #d5d5d5; border-radius: 12px; padding: 32px;
      text-align: center; cursor: pointer; transition: all 0.2s;
      margin-bottom: 24px; position: relative; background: #fafafa;
    }
    .upload-area.drag-over { border-color: #6c47ff; background: #f5f2ff; }
    .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    #submitBtn {
      width: 100%; padding: 14px; background: #6c47ff; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    #progressPanel { display: none; margin-top: 32px; }
    .stages {
      display: flex; margin-bottom: 24px;
      border-radius: 10px; overflow: hidden; border: 1px solid #e5e7eb;
    }
    .stage-step {
      flex: 1; padding: 10px 6px; text-align: center;
      font-size: 11px; font-weight: 600; color: #aaa;
      background: #f9fafb; border-right: 1px solid #e5e7eb;
    }
    .stage-step.active { background: #6c47ff; color: #fff; }
    .stage-step.done { background: #ecfdf5; color: #065f46; }
    .progress-track { background: #f0ecff; border-radius: 99px; height: 8px; overflow: hidden; margin: 10px 0; }
    .progress-fill { background: linear-gradient(90deg, #6c47ff, #a78bfa); height: 100%; width: 0%; transition: width 0.5s; }
    .log-area { background: #1e1e2e; padding: 12px 14px; max-height: 200px; overflow-y: auto; border-radius: 0 0 10px 10px; }
    .log-line { font-family: monospace; font-size: 11px; line-height: 1.8; color: #94a3b8; }
    .log-line.stage { color: #60cdff; font-weight: bold; }
    .result-box {
      display: none; margin-top: 20px; padding: 18px 20px;
      background: #f0fdf4; border: 1.5px solid #6ee7b7; border-radius: 12px;
      align-items: center; justify-content: space-between;
    }
    .result-box.show { display: flex; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">llms<span>.txt</span> Generator</div>
  <div class="subtitle">Cloud Edition — Replicating Local Setup</div>
  <div class="badge">⚡ Production Ready</div>

  <form id="genForm">
    <div class="tabs">
      <button type="button" class="tab active" onclick="switchTab(this, 'csv')">📄 CSV Upload</button>
      <button type="button" class="tab" onclick="switchTab(this, 'sitemap')">🗺 Sitemap URL</button>
    </div>

    <div id="panel-csv" class="tab-panel">
      <div class="upload-area" id="uploadArea">
        <input type="file" id="csv_file" name="csv_file" accept=".csv">
        <div>📄 Click or Drag CSV</div>
        <div id="fileName" style="font-size: 12px; color: #6c47ff; margin-top: 8px;"></div>
      </div>
    </div>

    <div id="panel-sitemap" class="tab-panel" style="display:none">
      <input type="url" id="url" name="url" placeholder="https://site.com/sitemap.xml" 
             style="width:100%; padding:12px; border:1.5px solid #e0e0e0; border-radius:10px; margin-bottom:20px;">
    </div>

    <input type="hidden" name="input_mode" id="input_mode" value="csv">
    <button type="submit" id="submitBtn">Generate llms.txt</button>
  </form>

  <div id="progressPanel">
    <div class="stages">
      <div class="stage-step" id="step-fetch">🌐 Fetching</div>
      <div class="stage-step" id="step-summarize">🤖 Summarising</div>
      <div class="stage-step" id="step-qa">✅ QA & Fix</div>
      <div class="stage-step" id="step-generate">📄 Generating</div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div id="progressLabel" style="font-size:12px; font-weight:bold; margin-bottom:10px;">Ready</div>
    <div class="log-area" id="logArea"></div>
    
    <div class="result-box" id="resultBox">
      <div style="font-size:13px; color:#065f46;">🎉 llms.txt is ready!</div>
      <button id="downloadBtn" style="background:#059669; color:white; border:none; padding:8px 16px; border-radius:8px; cursor:pointer;">Download</button>
    </div>
  </div>
</div>

<script>
  /* Logic adapted for cloud streaming */
  let currentJobId = null;
  const STAGES = ['fetch', 'summarize', 'qa', 'generate'];

  function switchTab(btn, mode) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('input_mode').value = mode;
    document.getElementById('panel-csv').style.display = mode === 'csv' ? 'block' : 'none';
    document.getElementById('panel-sitemap').style.display = mode === 'sitemap' ? 'block' : 'none';
  }

  // File label update
  document.getElementById('csv_file').addEventListener('change', function() {
    document.getElementById('fileName').textContent = this.files[0] ? '✓ ' + this.files[0].name : '';
  });

  document.getElementById('genForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const log = document.getElementById('logArea');
    
    btn.disabled = true;
    document.getElementById('progressPanel').style.display = 'block';
    log.innerHTML = '';
    
    // Send form data (supports file upload)
    const formData = new FormData(e.target);
    const res = await fetch('/start', { method: 'POST', body: formData });
    const data = await res.json();
    currentJobId = data.job_id;

    // Listen to streaming progress
    const evtSource = new EventSource('/progress/' + currentJobId);
    evtSource.onmessage = (event) => {
      const d = JSON.parse(event.data);
      if (d.type === 'stage') {
        updateStages(d.msg.toLowerCase());
        document.getElementById('progressLabel').innerText = d.msg;
        document.getElementById('progressFill').style.width = d.pct + '%';
        addLog(d.msg, 'stage');
      } else if (d.type === 'fetch' || d.type === 'summarize') {
        addLog(`${d.ok ? '✓' : '✗'} [${d.current}/${d.total}] ${d.url}`);
      } else if (d.type === 'done') {
        evtSource.close();
        document.getElementById('resultBox').classList.add('show');
        btn.disabled = false;
      }
    };
  });

  function updateStages(msg) {
    let passed = true;
    STAGES.forEach(s => {
      const el = document.getElementById('step-' + s);
      el.classList.remove('active', 'done');
      if (msg.includes(s)) { el.classList.add('active'); passed = false; }
      else if (passed) el.classList.add('done');
    });
  }

  function addLog(msg, type='') {
    const area = document.getElementById('logArea');
    const line = document.createElement('div');
    line.className = 'log-line ' + type;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    area.appendChild(line);
    area.scrollTop = area.scrollHeight;
  }

  document.getElementById('downloadBtn').onclick = () => {
    window.location.href = '/download/' + currentJobId;
  };
</script>
</body>
</html>
